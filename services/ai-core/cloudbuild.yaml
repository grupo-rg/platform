# Cloud Build pipeline for the ai-core Service + Worker.
#
# What it does, in order:
#   1. Builds the Docker image once.
#   2. Pushes it to Artifact Registry (both :$BUILD_ID and :latest tags).
#      Note: we use $BUILD_ID (UUID) instead of $SHORT_SHA because SHORT_SHA
#      is only populated for trigger-based builds; manual `gcloud builds
#      submit` leaves it empty, which would produce an image reference
#      ending in `:` and fail validation.
#   3. Deploys the Cloud Run *Service*   (HTTP dispatcher).
#   4. Deploys the Cloud Run *Job*       (worker; runs RunPipelineJobUseCase).
#
# Trigger options:
#   - Manual:        gcloud builds submit --config services/ai-core/cloudbuild.yaml services/ai-core
#   - Branch-based:  Wire a Cloud Build trigger on push to main (recommended
#                    for staging; production should still be manual approval).
#
# Substitutions (with sensible defaults; override on submit if needed):
#   _REGION          europe-southwest1
#   _REPO            ai-core              (Artifact Registry repo name)
#   _SERVICE_NAME    ai-core
#   _JOB_NAME        ai-core-worker
#   _WORKER_SA       ai-core-worker-sa@${PROJECT_ID}.iam.gserviceaccount.com
#   _SERVICE_SA      firebase-adminsdk-fbsvc@${PROJECT_ID}.iam.gserviceaccount.com
#
# IMPORTANT: env vars (FIREBASE_*, GOOGLE_GENAI_API_KEY, QDRANT_*, etc.) are
# NOT set here — they live on the deployed resources via `gcloud run ... update`
# or Cloud Run's UI. Same convention as the existing setup. See README.md.

substitutions:
  _REGION: europe-southwest1
  _SERVICE_NAME: ai-core
  _JOB_NAME: ai-core-worker
  _SERVICE_MEMORY: "1Gi"
  _SERVICE_CPU: "1"
  _SERVICE_TIMEOUT: "60s"
  _JOB_MEMORY: "2Gi"
  _JOB_CPU: "2"
  # 3600s is the Cloud Run Jobs default; raise to 24h with --task-timeout=86400s
  # when handling the 250+ page workloads that prompted this whole rewrite.
  _JOB_TASK_TIMEOUT: "3600s"
  _JOB_PARALLELISM: "1"
  _JOB_TASK_COUNT: "1"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  # `dynamic_substitutions: true` lets us reference ${PROJECT_ID} and other
  # built-in substitutions inside substitution values themselves, which is
  # how `_WORKER_SA`, `_SERVICE_SA`, and image paths get composed at build
  # time. Without it, the parser leaves them as literals and rejects the
  # template.
  dynamic_substitutions: true

steps:
  # -- 1. Build ------------------------------------------------------------
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core:${BUILD_ID}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core:latest
      - --file=Dockerfile
      - .

  # -- 2. Push -------------------------------------------------------------
  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core"]

  # -- 3. Deploy Cloud Run Service (HTTP dispatcher) -----------------------
  # NOTE: --update-env-vars only updates the named keys; other env vars
  # already set on the service are preserved. WORKER_JOB_NAME is required
  # by the dispatcher to know which Job to invoke.
  - id: deploy-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --memory=${_SERVICE_MEMORY}
      - --cpu=${_SERVICE_CPU}
      - --timeout=${_SERVICE_TIMEOUT}
      - --service-account=firebase-adminsdk-fbsvc@${PROJECT_ID}.iam.gserviceaccount.com
      - --update-env-vars=WORKER_JOB_NAME=projects/${PROJECT_ID}/locations/${_REGION}/jobs/${_JOB_NAME}
      - --quiet

  # -- 4. Deploy Cloud Run Job (worker) ------------------------------------
  # The Job runs the SAME image but with a different command — no second
  # Dockerfile to maintain. Heartbeat / cancellation poll intervals are
  # tunable via env vars but default to sane values (30s / 5s).
  # `gcloud run jobs deploy` is the unified create-or-update command (added
  # in gcloud 451+). Avoids needing a bash conditional with a shell variable,
  # which Cloud Build's substitution parser mishandles even with $$ escaping.
  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core:${BUILD_ID}
      - --region=${_REGION}
      - --memory=${_JOB_MEMORY}
      - --cpu=${_JOB_CPU}
      - --task-timeout=${_JOB_TASK_TIMEOUT}
      - --parallelism=${_JOB_PARALLELISM}
      - --tasks=${_JOB_TASK_COUNT}
      - --service-account=ai-core-worker-sa@${PROJECT_ID}.iam.gserviceaccount.com
      - --command=python
      - --args=-m,src.core.jobs.worker_main
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core:${BUILD_ID}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/ai-core/ai-core:latest
